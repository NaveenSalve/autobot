name: Deploy Frontend to GitHub Pages
on:
  push:
    branches: [master]
    paths: ['client-acquisition-platform/frontend/**']
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client-acquisition-platform/frontend/package-lock.json
      - run: npm ci
        working-directory: client-acquisition-platform/frontend
      - run: npm run build
        working-directory: client-acquisition-platform/frontend
        env:
          VITE_BASE_URL: /autobot
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'http://localhost:8000' }}
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client-acquisition-platform/frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4
